name: Code Quality and Security

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Security Scan Summary
      if: always()
      run: |
        echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
        if [ -f "trivy-results.sarif" ]; then
          echo "- **Status**: ✅ Security scan completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Details**: Check Security tab for full report" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Status**: ❌ Security scan failed" >> $GITHUB_STEP_SUMMARY
        fi

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Generate dependency report
      run: ./gradlew dependencies
      
    - name: Check for known vulnerabilities
      run: |
        echo "## Dependency Check" >> $GITHUB_STEP_SUMMARY
        echo "Checking for known vulnerabilities in dependencies..." >> $GITHUB_STEP_SUMMARY
        
        # Check for common vulnerable dependencies
        if grep -q "com.google.firebase:firebase-analytics" app/build.gradle; then
          echo "- ⚠️ **Firebase Analytics**: Ensure you're using a recent version" >> $GITHUB_STEP_SUMMARY
        fi
        
        if grep -q "com.squareup.okhttp3:okhttp" app/build.gradle; then
          echo "- ℹ️ **OkHttp**: Version 4.9.0 detected" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **Status**: ✅ Dependency check completed" >> $GITHUB_STEP_SUMMARY

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Detekt (if configured)
      run: |
        if ./gradlew tasks | grep -q "detekt"; then
          ./gradlew detekt
          echo "Detekt analysis completed"
        else
          echo "Detekt not configured, skipping"
        fi
      continue-on-error: true
      
    - name: Check code style
      run: |
        echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
        
        # Count Java files
        JAVA_FILES=$(find . -name "*.java" -not -path "./build/*" | wc -l)
        echo "- **Java Files**: $JAVA_FILES" >> $GITHUB_STEP_SUMMARY
        
        # Check for common code quality issues
        TODO_COUNT=$(grep -r "TODO\|FIXME" --include="*.java" . | wc -l || true)
        if [ $TODO_COUNT -gt 0 ]; then
          echo "- ⚠️ **TODO/FIXME comments**: $TODO_COUNT found" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Check for hardcoded URLs
        HARDCODED_URLS=$(grep -r "http://" --include="*.java" . | wc -l || true)
        if [ $HARDCODED_URLS -gt 0 ]; then
          echo "- ⚠️ **Hardcoded HTTP URLs**: $HARDCODED_URLS found" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **Status**: ✅ Code quality check completed" >> $GITHUB_STEP_SUMMARY

  size-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK for analysis
      run: ./gradlew assembleDebug
      
    - name: Analyze APK size
      run: |
        echo "## APK Size Analysis" >> $GITHUB_STEP_SUMMARY
        
        APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
        if [ -f "$APK_PATH" ]; then
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
          echo "- **Debug APK Size**: ${APK_SIZE_MB} MB ($APK_SIZE bytes)" >> $GITHUB_STEP_SUMMARY
          
          if [ $APK_SIZE_MB -gt 50 ]; then
            echo "- ⚠️ **Warning**: APK is larger than 50MB" >> $GITHUB_STEP_SUMMARY
          elif [ $APK_SIZE_MB -gt 25 ]; then
            echo "- ℹ️ **Info**: APK is moderately sized" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Good**: APK size is reasonable" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "- ❌ **Error**: APK not found" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Analyze project structure
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Project Structure" >> $GITHUB_STEP_SUMMARY
        echo "- **Total Lines of Code**: $(find . -name "*.java" -not -path "./build/*" -exec wc -l {} + | tail -n1 | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Files**: $(find app/src/main/res -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
